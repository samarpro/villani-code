id: terminal_007_makefile_smoke_target
family: terminal_workflow
difficulty: medium
language: python
max_minutes: 4
max_files_touched: 3
expected_artifacts:
- patch
visible_verification:
- make smoke
hidden_verification:
- pytest -q tests/test_smoke_runner.py
success_policy:
  require_visible_pass: true
  require_hidden_pass: true
  fail_on_timeout: true
  fail_on_repo_dirty_outside_allowlist: true
allowlist_paths:
- Makefile
- scripts/
- tests/
- src/
benchmark_track: core
