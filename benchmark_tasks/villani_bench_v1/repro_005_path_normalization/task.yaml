id: repro_005_path_normalization
family: repro_test
difficulty: hard
language: python
max_minutes: 3
max_files_touched: 4
expected_artifacts:
- patch
visible_verification:
- python -c "import pathlib, sys, pytest; sys.path.insert(0, str(pathlib.Path('src').resolve())); raise SystemExit(0 if pytest.main(['-q', 'tests/test_path_normalization_regression.py']) != 0 else 1)"
hidden_verification:
- python -c "import pathlib, sys, pytest; sys.path.insert(0, str(pathlib.Path('src').resolve())); raise SystemExit(pytest.main(['-q', 'tests/test_path_normalization_regression.py']))"
success_policy:
  require_visible_pass: true
  require_hidden_pass: true
  fail_on_timeout: true
  fail_on_repo_dirty_outside_allowlist: true
allowlist_paths:
- tests/
- src/
benchmark_track: core
