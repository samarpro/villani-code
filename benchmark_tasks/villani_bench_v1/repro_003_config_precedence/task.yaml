id: repro_003_config_precedence
family: repro_test
difficulty: hard
language: python
max_minutes: 5
max_files_touched: 3
expected_artifacts:
- patch
visible_verification:
- pytest -q
hidden_verification:
- python -c "import ast,pathlib; p=pathlib.Path('tests/test_smoke.py'); t=ast.parse(p.read_text()); names=[n.name for n in t.body if isinstance(n, ast.FunctionDef) and n.name.startswith('test_')]; assert any(n != 'test_smoke' for n in names), names"
success_policy:
  require_visible_pass: true
  require_hidden_pass: true
  fail_on_timeout: true
  fail_on_repo_dirty_outside_allowlist: true
allowlist_paths:
- tests/
- src/
benchmark_track: core
