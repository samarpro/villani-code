id: localize_001_feature_flag
family: localize_patch
difficulty: medium
language: python
max_minutes: 20
max_files_touched: 4
expected_artifacts:
- patch
visible_verification:
- pytest -q tests/test_feature_flag_runtime.py::test_enabled_flag_takes_effect
hidden_verification:
- pytest -q
success_policy:
  require_visible_pass: true
  require_hidden_pass: true
  fail_on_timeout: true
  fail_on_repo_dirty_outside_allowlist: true
allowlist_paths:
- src/
- tests/
