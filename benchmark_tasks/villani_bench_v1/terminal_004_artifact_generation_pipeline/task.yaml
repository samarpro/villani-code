id: terminal_004_artifact_generation_pipeline
family: terminal_workflow
difficulty: easy
language: python
max_minutes: 5
max_files_touched: 4
expected_artifacts:
- patch
visible_verification:
- pytest -q
hidden_verification:
- pytest -q
success_policy:
  require_visible_pass: true
  require_hidden_pass: true
  fail_on_timeout: true
  fail_on_repo_dirty_outside_allowlist: true
allowlist_paths:
- app/
- tests/
- Makefile
- pyproject.toml
benchmark_track: core
