id: bugfix_006_markdown_escape
family: bugfix
difficulty: medium
language: python
max_minutes: 3
max_files_touched: 4
expected_artifacts:
- patch
visible_verification:
- python -c "import pathlib, sys, pytest; sys.path.insert(0, str(pathlib.Path('src').resolve())); raise SystemExit(pytest.main(['-q']))"
hidden_verification:
- python -c "import pathlib, sys, pytest; sys.path.insert(0, str(pathlib.Path('src').resolve())); raise SystemExit(pytest.main(['-q', 'tests/test_core.py::test_path']))"
success_policy:
  require_visible_pass: true
  require_hidden_pass: true
  fail_on_timeout: true
  fail_on_repo_dirty_outside_allowlist: true
allowlist_paths:
- src/
- tests/
benchmark_track: core
