id: localize_005_cache_invalidation
family: localize_patch
difficulty: hard
language: python
max_minutes: 3
max_files_touched: 4
expected_artifacts:
- patch
visible_verification:
- pytest -q
hidden_verification:
- 'python -c "from app.c import entry; assert entry(0) == \"0\""'
success_policy:
  require_visible_pass: true
  require_hidden_pass: true
  fail_on_timeout: true
  fail_on_repo_dirty_outside_allowlist: true
allowlist_paths:
- src/app/
forbidden_paths:
- tests/
- pyproject.toml
benchmark_track: core
