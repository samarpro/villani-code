id: bugfix_012_serializer_roundtrip
family: bugfix
difficulty: medium
language: python
max_minutes: 3
max_files_touched: 4
expected_artifacts:
- patch
visible_verification:
- pytest -q
hidden_verification:
- python -c "import pathlib, sys; sys.path.insert(0, str(pathlib.Path('src').resolve())); from app.core import paginate; data=[1,2,3,4,5]; pages=paginate(data, 2); assert [x for p in pages for x in p] == data"
success_policy:
  require_visible_pass: true
  require_hidden_pass: true
  fail_on_timeout: true
  fail_on_repo_dirty_outside_allowlist: true
allowlist_paths:
- src/
- tests/
benchmark_track: core
