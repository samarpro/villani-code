id: terminal_002_makefile_test_path
family: terminal_workflow
difficulty: easy
language: python
max_minutes: 3
max_files_touched: 2
expected_artifacts:
- patch
visible_verification:
- make test
hidden_verification:
- pytest -q tests/test_basic.py
success_policy:
  require_visible_pass: true
  require_hidden_pass: true
  fail_on_timeout: true
  fail_on_repo_dirty_outside_allowlist: true
allowlist_paths:
- Makefile
- scripts/
- tests/
- pyproject.toml
- src/
benchmark_track: core
