id: two_stage_fix
benchmark_track: core
family: bugfix
difficulty: hard
language: python
max_minutes: 5
max_files_touched: 5
expected_artifacts:
- patch
visible_verification:
- pytest -q tests/test_cache.py
hidden_verification:
- pytest -q
success_policy:
  require_visible_pass: true
  require_hidden_pass: true
  fail_on_timeout: true
  fail_on_repo_dirty_outside_allowlist: true
allowlist_paths:
- src/
- tests/
expected_touched_max: 2
adjacency_expected: true
recovery_expected: true
task_type: adjacent_two_file_fix
forbidden_paths:
- docs/
- README.md
