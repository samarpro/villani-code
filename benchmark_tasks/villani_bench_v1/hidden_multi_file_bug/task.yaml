id: hidden_multi_file_bug
benchmark_track: core
family: bugfix
difficulty: medium
language: python
max_minutes: 5
max_files_touched: 4
expected_artifacts:
- patch
visible_verification:
- pytest -q tests/test_pagination.py
hidden_verification:
- pytest -q
success_policy:
  require_visible_pass: true
  require_hidden_pass: true
  fail_on_timeout: true
  fail_on_repo_dirty_outside_allowlist: true
allowlist_paths:
- src/
- tests/
recovery_expected: true
task_type: verify_and_recover
forbidden_paths:
- docs/
- README.md
