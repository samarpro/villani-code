name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,tui]'
      - name: Run tests
        run: pytest
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy villani_code/cli.py villani_code/interactive.py villani_code/state_tooling.py villani_code/autonomous_reporting.py
